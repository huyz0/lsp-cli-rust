name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0) — must already exist"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            linker: gcc-aarch64-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Cross-compiling to aarch64 Linux from an x86_64 ubuntu-latest
      # runner needs a foreign-arch linker/libc — cargo's default cc linker
      # can't produce an aarch64 binary otherwise.
      - name: Install aarch64 cross linker
        if: matrix.linker
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.linker }}

      - name: Configure aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          bin=target/${{ matrix.target }}/release/lsp
          out=lsp-${{ matrix.target }}.tar.gz
          tar -czf "$out" -C "$(dirname "$bin")" "$(basename "$bin")"
          echo "ASSET=$out" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/lsp.exe"
          $out = "lsp-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $out
          echo "ASSET=$out" >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - id: tag
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # The `secrets` context can't be referenced directly in a job-level `if:`
  # (GitHub rejects the whole workflow file at parse time if it is —
  # confirmed live: `Unrecognized named-value: 'secrets'`). This job routes
  # around that by resolving presence into a step output first, which
  # `needs.check-secrets.outputs.*` downstream jobs' `if:` can reference.
  check-secrets:
    name: Check publishing secrets
    runs-on: ubuntu-latest
    outputs:
      has_homebrew: ${{ steps.check.outputs.has_homebrew }}
      has_winget: ${{ steps.check.outputs.has_winget }}
    steps:
      - id: check
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          echo "has_homebrew=$([ -n "$HOMEBREW_TAP_TOKEN" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_winget=$([ -n "$WINGET_TOKEN" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  homebrew:
    name: Update Homebrew formula
    needs: [release, check-secrets]
    runs-on: ubuntu-latest
    # One-time setup this job depends on (not something this workflow can
    # do for you): create huyz0/homebrew-tap (done), then add a
    # HOMEBREW_TAP_TOKEN repo secret here — a PAT (classic or fine-grained)
    # with `contents:write` on huyz0/homebrew-tap, since the default
    # GITHUB_TOKEN only has access to *this* repo. Skips quietly instead of
    # failing every release when that secret hasn't been added yet.
    if: needs.check-secrets.outputs.has_homebrew == 'true'
    env:
      GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Version
        id: version
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        run: gh release download "${{ needs.release.outputs.tag }}" --repo ${{ github.repository }} --pattern checksums.txt

      - name: Parse checksums
        id: sha
        run: |
          echo "mac_arm=$(grep aarch64-apple-darwin.tar.gz checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "mac_intel=$(grep x86_64-apple-darwin.tar.gz checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm=$(grep aarch64-unknown-linux-gnu.tar.gz checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_intel=$(grep x86_64-unknown-linux-gnu.tar.gz checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: |
          cat > lsp-cli.rb << FORMULA
          class LspCli < Formula
            desc "LSP-based code navigation CLI for coding agents and humans"
            homepage "https://github.com/${{ github.repository }}"
            version "${{ steps.version.outputs.version }}"
            license "MIT"

            if OS.mac? && Hardware::CPU.arm?
              url "https://github.com/${{ github.repository }}/releases/download/${{ needs.release.outputs.tag }}/lsp-aarch64-apple-darwin.tar.gz"
              sha256 "${{ steps.sha.outputs.mac_arm }}"
            elsif OS.mac? && Hardware::CPU.intel?
              url "https://github.com/${{ github.repository }}/releases/download/${{ needs.release.outputs.tag }}/lsp-x86_64-apple-darwin.tar.gz"
              sha256 "${{ steps.sha.outputs.mac_intel }}"
            elsif OS.linux? && Hardware::CPU.arm?
              url "https://github.com/${{ github.repository }}/releases/download/${{ needs.release.outputs.tag }}/lsp-aarch64-unknown-linux-gnu.tar.gz"
              sha256 "${{ steps.sha.outputs.linux_arm }}"
            elsif OS.linux? && Hardware::CPU.intel?
              url "https://github.com/${{ github.repository }}/releases/download/${{ needs.release.outputs.tag }}/lsp-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${{ steps.sha.outputs.linux_intel }}"
            end

            def install
              bin.install "lsp"
            end

            def caveats
              <<~EOS
                lsp-cli is installed! Get started:

                  lsp --help
                  lsp install --all      # install language servers you'll actually use
                  lsp outline path/to/file.ts

                Full documentation: https://github.com/${{ github.repository }}
              EOS
            end

            test do
              system "#{bin}/lsp", "--help"
            end
          end
          FORMULA

      - name: Push to homebrew-tap
        run: |
          CONTENT=$(base64 -w 0 lsp-cli.rb)
          SHA=$(gh api repos/huyz0/homebrew-tap/contents/Formula/lsp-cli.rb --jq '.sha' 2>/dev/null || echo "")
          if [ -n "$SHA" ]; then
            gh api -X PUT repos/huyz0/homebrew-tap/contents/Formula/lsp-cli.rb \
              -f message="lsp-cli ${{ steps.version.outputs.version }}" \
              -f content="$CONTENT" \
              -f sha="$SHA"
          else
            gh api -X PUT repos/huyz0/homebrew-tap/contents/Formula/lsp-cli.rb \
              -f message="lsp-cli ${{ steps.version.outputs.version }}" \
              -f content="$CONTENT"
          fi

  winget:
    name: Update winget manifest
    needs: [release, check-secrets]
    runs-on: windows-latest
    # One-time setup: create a fine-grained PAT with access to submit PRs
    # against microsoft/winget-pkgs (see
    # https://github.com/vedantmgoyal9/winget-releaser#token) and add it as
    # the WINGET_TOKEN repo secret. The very first submission additionally
    # needs the package to pass Microsoft's manual manifest validation
    # before winget-pkgs accepts it — that review is outside this repo's
    # control. Skips quietly until the secret exists.
    if: needs.check-secrets.outputs.has_winget == 'true'
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: huyz0.lsp-cli
          installers-regex: 'x86_64-pc-windows-msvc\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
          release-tag: ${{ needs.release.outputs.tag }}
